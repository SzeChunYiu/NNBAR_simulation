# csup project config — read by ~/bin/csup and ~/bin/csup-dashboard.
# nnbar simulation lives on MyDrive locally (heavy GEANT4 builds + recon data),
# but the active codex-supervisor execution has migrated to LUNARC as of
# 2026-05-11. The local [hosts."mac-mini"] block is retained for historical
# reference; the five LUNARC host blocks below are authoritative for new work.

schema_version = 1

[project]
name = "nnbar"
description = "NNBAR simulation, reconstruction, and G4GPU R&D. 22-pane cn018 layout + 20 review panes across cn002/cn058/cn137 for BD-201-400 Geant4 optimization discovery."

# ---- Mac local (legacy / dashboard only) ------------------------------------

[hosts."mac-mini"]
prompts = "scripts/codex-supervisor/nnbar-gpu-batch-prompts.txt"
session = "nnbar-gpu-batch"
tasks_dir = "codex-tasks"

# ---- LUNARC sessions (authoritative) ---------------------------------------
# Project_dir on LUNARC: /projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim
# Each host runs ONE tmux session inside the holder.sbatch allocation.
# Prompts files and tasks_dir paths are relative to project_dir on LUNARC.

[hosts."recon-lunarc"]
ssh = "lunarc-cn018"
project_dir = "/projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim"
prompts = "codex-prompts-recon.txt"
tasks_dir = "codex-tasks/recon"
session = "nnbar-recon-lunarc"
role = "remote-executor"
sync_policy = "git-only"
remote_env = "source /projects/hep/fs10/shared/codex-tooling/env-shared.sh; export CODEX_SUPERVISOR_DEBUGGER=0 CODEX_SUPERVISOR_VALIDATOR=0"

[hosts."sim-lunarc"]
ssh = "lunarc-cn018"
project_dir = "/projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim"
prompts = "codex-prompts-sim.txt"
tasks_dir = "codex-tasks/sim"
session = "nnbar-sim-lunarc"
role = "remote-executor"
sync_policy = "git-only"
remote_env = "source /projects/hep/fs10/shared/codex-tooling/env-shared.sh; export CODEX_SUPERVISOR_DEBUGGER=0 CODEX_SUPERVISOR_VALIDATOR=0"

[hosts."g4gpu-lunarc"]
ssh = "lunarc-cn018"
project_dir = "/projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim"
prompts = "codex-prompts-g4gpu.txt"
tasks_dir = "codex-tasks/g4gpu"
session = "nnbar-g4gpu-lunarc"
role = "remote-executor"
sync_policy = "git-only"
remote_env = "source /projects/hep/fs10/shared/codex-tooling/env-shared.sh; export CODEX_SUPERVISOR_DEBUGGER=0 CODEX_SUPERVISOR_VALIDATOR=0"

[hosts."review-lunarc"]
ssh = "lunarc-cn018"
project_dir = "/projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim"
prompts = "codex-prompts-review.txt"
tasks_dir = "codex-tasks/review"
session = "nnbar-review-lunarc"
role = "remote-executor"
sync_policy = "git-only"
remote_env = "source /projects/hep/fs10/shared/codex-tooling/env-shared.sh; export CODEX_SUPERVISOR_DEBUGGER=0 CODEX_SUPERVISOR_VALIDATOR=0"

[hosts."meta-lunarc"]
ssh = "lunarc-cn018"
# Project-wide meta session: 1 DEBUGGER + 1 VALIDATOR-PLANNER pane.
# Cross-cutting only — never implements other lanes' tasks. Mirrors the
# babbloo `lunarc-meta` convention. Non-meta sessions disable generated
# debugger/validator panes via remote_env; this session keeps the explicit
# DEBUGGER/VALIDATOR lane prompts.
project_dir = "/projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim"
prompts = "codex-prompts-meta.txt"
tasks_dir = "codex-tasks/meta"
session = "nnbar-meta-lunarc"
role = "meta"
sync_policy = "git-only"

# ---- G4 optimization review sessions on idle holders (cn002/cn058/cn137) ----
# 20 dedicated review panes for Geant4 BD-201-400 line-by-line optimization.

[hosts."review2-lunarc"]
ssh = "lunarc-cn002"
project_dir = "/projects/hep/fs10/shared/nnbar/billy/NNBAR_Detector_sim"
